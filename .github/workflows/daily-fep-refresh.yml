name: Daily FEP Refresh — Fingertips

# Runs every day at 06:00 UTC
# Fetches latest NHS Fingertips indicators and updates kent-fep-data.json
# EPD prescribing data is NOT re-streamed daily (18M rows, monthly NHSBSA release)
# EPD uses last committed values until manually triggered when new month published
#
# NOTE: daily_refresh.py commits kent-fep-data.json and the history/ snapshot
# itself via the GitHub API. There must be NO git commit/push step in this
# workflow — the script's API commits advance the remote branch mid-run, so a
# trailing git push from the (now stale) checkout is always rejected.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:       # also triggerable manually from Actions tab

permissions:
  contents: write          # required for the script's API commits

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 now

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fingertips_py requests pandas

      - name: Run Fingertips refresh (script commits via API)
        env:
          GITHUB_TOKEN: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}
        run: python daily_refresh.py

      - name: Inject static stat fallbacks into HTML (commits via API)
        env:
          GITHUB_TOKEN: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}
        run: python inject_stats.py
