name: Monthly NHS 111 Data Fetch

# Runs on the 1st of every month at 07:00 UTC
# Scrapes NHS England IUCADC page to find latest CSV (randomised URLs)
# Data published ~6 weeks after month end — fully automated, no manual updates

on:
  schedule:
    - cron: '0 7 1 * *'   # 07:00 UTC on the 1st of every month
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # required to push commits back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-111-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run NHS 111 data fetcher
        env:
          GITHUB_TOKEN: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}
        run: python fetch_111_data.py

      - name: Commit updated files
        run: |
          git config user.name  "Assistiv Data Bot"
          git config user.email "bot@assistiv.health"
          git add kent-111-data.json history/
          git diff --staged --quiet || git commit -m "NHS 111 monthly refresh — $(date -u '+%Y-%m-%d')"
          git push
