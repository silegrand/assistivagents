name: Monthly NHS 111 Data Fetch

# Runs on the 1st of every month at 07:00 UTC
# Scrapes NHS England IUCADC page to find latest CSV (randomised URLs)
# Data published ~6 weeks after month end — fully automated, no manual updates
#
# NOTE: fetch_111_data.py commits kent-111-data.json and the history/ snapshot
# itself via the GitHub API. There must be NO git commit/push step in this
# workflow — the script's API commits advance the remote branch mid-run, so a
# trailing git push from the (now stale) checkout is always rejected. That
# rejected push was why this workflow showed as failed even though the data
# was landing correctly.

on:
  schedule:
    - cron: '0 7 1 * *'   # 07:00 UTC on the 1st of every month
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # required for the script's API commits

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-111-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run NHS 111 data fetcher (script commits via API)
        env:
          GITHUB_TOKEN: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}
        run: python fetch_111_data.py

      - name: Confirm output
        run: |
          if [ -f kent-111-data.json ]; then
            python -c "import json; d=json.load(open('kent-111-data.json')); print('Period:', d['meta'].get('period_nice','unknown'), '| Kent calls (est.):', d.get('kent_icb_estimated',{}).get('calls_received','n/a'))"
          else
            echo "WARNING: kent-111-data.json not found locally (script may have skipped — already committed this period)"
          fi

      - name: Inject static stat fallbacks into HTML (commits via API)
        env:
          GITHUB_TOKEN: ${{ secrets.ASSISTIV_GITHUB_TOKEN }}
        run: python inject_stats.py
